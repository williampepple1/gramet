<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #4a6cf7, #6a3de8);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header svg { width: 22px; height: 22px; }
    .body { padding: 14px 16px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50;
    }
    .status-dot.disabled { background: #ccc; }
    .status-text { font-size: 12px; color: #666; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    .actions button {
      padding: 9px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      background: #fafafa;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .actions button:hover { background: #f0f0f0; }
    .actions button svg { width: 16px; height: 16px; color: #4a6cf7; flex-shrink: 0; }
    .actions button .label { font-weight: 500; color: #333; }
    .actions button .desc { font-size: 11px; color: #888; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      text-align: center;
    }
    .footer a {
      color: #4a6cf7;
      text-decoration: none;
      font-size: 12px;
    }
    .footer a:hover { text-decoration: underline; }
    .badge {
      background: #fef3cd;
      color: #856404;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <h1>Gramet</h1>
  </div>
  <div class="body">
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Ready</span>
    </div>
    <div id="configBadge" class="badge" style="display:none">
      ⚠ No API key set. <a href="#" id="openOptions" style="color:#4a6cf7;font-weight:500">Configure →</a>
    </div>
    <div class="actions">
      <button id="correctBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <div><div class="label">Correct Grammar</div><div class="desc">Fix errors in selected text</div></div>
      </button>
      <button id="paraphraseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>
        <div><div class="label">Paraphrase</div><div class="desc">Rewrite selected text</div></div>
      </button>
    </div>
  </div>
  <div class="footer">
    <a href="#" id="openOptionsLink">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
